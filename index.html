<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>ADS Rewards - Earn & Withdraw</title>

<meta name="description" content="Complete tasks, invite friends, spin the wheel & earn crypto rewards!" />

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<meta property="og:title" content="ADS Rewards Mini App" />
<meta property="og:description" content="Earn crypto by completing tasks and inviting friends!" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<style>
body{
  margin:0;
  font-family:system-ui;
}
</style>

<script>
window.addEventListener("DOMContentLoaded", function () {

  const tg = window.Telegram?.WebApp;

  const isTelegramMiniApp =
    tg &&
    tg.platform &&
    tg.initDataUnsafe &&
    tg.initDataUnsafe.user;

  if (!isTelegramMiniApp) {
    document.body.innerHTML =
      "<h2 style='text-align:center;margin-top:40vh'>Open this Mini App inside Telegram</h2>";
    return;
  }

  tg.expand();
  tg.ready();

});
</script>

</head>

<body>

<div id="root"></div>

<script type="module" src="/src/main.tsx"></script>

</body>
</html>
