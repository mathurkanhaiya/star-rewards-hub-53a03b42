    /* ── Reset & prevent zoom/select ── */
    *, *::before, *::after {
      box-sizing: border-box;
      /* Prevent text selection everywhere */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      /* Prevent tap callout on iOS */
      -webkit-touch-callout: none;
      /* Prevent tap highlight flash */
      -webkit-tap-highlight-color: transparent;
    }

    /* Allow selection only in input/textarea fields */
    input, textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    html {
      /* Prevent font size inflation on orientation change */
      -webkit-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      text-size-adjust: 100%;
      /* Prevent overscroll bounce */
      overscroll-behavior: none;
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: #06080f;
      color: #fff;
      /* Prevent overscroll */

      /* Prevent horizontal scroll */
      overflow-x: hidden;
      /* Smooth scroll on iOS */
      -webkit-overflow-scrolling: touch;
      height: 100%;
      /* Prevent zoom on double tap */

  </style><script>
    (function () {
      /* ── Prevent zoom gestures ── */

      // Prevent pinch zoom
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      // Prevent double-tap zoom
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });

      // Prevent ctrl+scroll zoom (desktop)
      document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });

      // Prevent ctrl+plus / ctrl+minus zoom (desktop/keyboard)
      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=')) {
          e.preventDefault();
        }
      });

      /* ── Prevent context menu (long press on mobile / right click) ── */
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      /* ── Prevent copy/cut ── */
      document.addEventListener('copy', function(e) {
        // Allow copy inside input/textarea
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (tag !== 'input' && tag !== 'textarea') e.preventDefault();
      });

      document.addEventListener('cut', function(e) {
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (tag !== 'input' && tag !== 'textarea') e.preventDefault();
      });

      /* ── Telegram WebApp init ── */
      const tg = window.Telegram?.WebApp;
      const isTG = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (!isTG) return;

      tg.expand();
      tg.ready();

      try {
        tg.setHeaderColor('#06080f');
        tg.setBackgroundColor('#06080f');
      } catch (e) {}

      try { tg.disableVerticalSwipes?.(); } catch (e) {}
    })();
